<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Local Gratis</title>
  <link rel="stylesheet" href="Sytle.css">
</head>
<body>
<div class="chat-container">
    <div class="header">
        🍔 RapiBot 
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hola bienvenido
             Soy Rapibot tu asistente virtual de menu ¿en que puedo ayudarte el dia de hoy?
        </div>
    </div>

    <div class="quick-actions">
      <button class="chip" type="button" data-text="menu">Menú</button>
      <button class="chip" type="button" data-text="recibo">Recibo</button>
      <button class="chip" type="button" data-text="ayuda">Ayuda</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe 'menu', 'hamburguesa' o 'ayuda'...">
        <button id="sendButton" type="button">Enviar</button>
    </div>
</div>
<script src="Script.js"></script>
</body>
